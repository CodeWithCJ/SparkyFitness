{{- include "sparkyfitness.validateRouting" . }}
{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "sparkyfitness.fullname" . }}
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "httpRoute.parentRef.name is required when httpRoute.enabled=true" .Values.httpRoute.parentRef.name }}
      {{- with .Values.httpRoute.parentRef.namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.httpRoute.parentRef.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    {{- $serverPaths := .Values.httpRoute.serverPaths | default (list "/api" "/uploads") }}
    {{- range $serverPaths }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ . | quote }}
      backendRefs:
        - name: {{ include "sparkyfitness.fullname" $ }}-server
          port: {{ $.Values.server.port }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "sparkyfitness.fullname" . }}-frontend
          port: {{ .Values.frontend.port }}
{{- end }}
