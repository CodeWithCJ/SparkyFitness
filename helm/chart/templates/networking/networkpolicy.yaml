{{- if .Values.networkPolicy.enabled }}
---
# Frontend: allow ingress from anywhere on HTTP
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sparkyfitness.fullname" . }}-frontend
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  podSelector:
    matchLabels:
      {{- include "sparkyfitness.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes: [Ingress, Egress]
  ingress:
    {{- $frontendFrom := (.Values.frontend.networkPolicy | default dict).from | default list }}
    {{- if gt (len $frontendFrom) 0 }}
    - from:
        {{- toYaml $frontendFrom | nindent 8 }}
      ports:
        - port: {{ .Values.frontend.port }}
    {{- else }}
    # Legacy permissive ingress — allows any source on frontend.port.
    # Set frontend.networkPolicy.from to restrict.
    - ports:
        - port: {{ .Values.frontend.port }}
    {{- end }}
  egress:
    # → server
    - to:
        - podSelector:
            matchLabels:
              {{- include "sparkyfitness.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: server
      ports:
        - port: {{ .Values.server.port }}
    # → DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Server: accept from frontend, egress to DB + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sparkyfitness.fullname" . }}-server
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  podSelector:
    matchLabels:
      {{- include "sparkyfitness.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "sparkyfitness.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
      ports:
        - port: {{ .Values.server.port }}
  egress:
    {{- if .Values.postgresql.enabled }}
    # → bundled PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "sparkyfitness.bundledPostgresqlSelectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
    {{- else }}
    # → external PostgreSQL
    {{- $extNp := .Values.externalDatabase.networkPolicy | default dict }}
    {{- $cidrs := $extNp.cidrs | default list }}
    {{- $nsSel := $extNp.namespaceSelector | default dict }}
    {{- $podSel := $extNp.podSelector | default dict }}
    {{- if or (gt (len $cidrs) 0) (gt (len $nsSel) 0) (gt (len $podSel) 0) }}
    - to:
        {{- range $cidrs }}
        - ipBlock:
            cidr: {{ . | quote }}
        {{- end }}
        {{- if gt (len $nsSel) 0 }}
        - namespaceSelector:
            {{- toYaml $nsSel | nindent 12 }}
        {{- end }}
        {{- if gt (len $podSel) 0 }}
        - podSelector:
            {{- toYaml $podSel | nindent 12 }}
        {{- end }}
      ports:
        - port: {{ .Values.externalDatabase.port | default 5432 }}
    {{- else }}
    # Legacy permissive egress — no destination restriction.
    # Set externalDatabase.networkPolicy.cidrs / namespaceSelector / podSelector
    # to restrict. See NOTES.txt for guidance.
    - ports:
        - port: {{ .Values.externalDatabase.port | default 5432 }}
    {{- end }}
    {{- end }}
    {{- if .Values.config.garmin.enabled }}
    # → Garmin microservice
    - to:
        - podSelector:
            matchLabels:
              {{- include "sparkyfitness.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: garmin
      ports:
        - port: {{ .Values.garmin.port }}
    {{- end }}
    {{- if .Values.config.oidc.enabled }}
    # → OIDC provider (HTTPS)
    {{- $oidcTo := (.Values.config.oidc.networkPolicy | default dict).to | default list }}
    {{- if gt (len $oidcTo) 0 }}
    - to:
        {{- toYaml $oidcTo | nindent 8 }}
      ports:
        - port: 443
    {{- else }}
    # Legacy permissive egress — set config.oidc.networkPolicy.to to restrict.
    - ports:
        - port: 443
    {{- end }}
    {{- end }}
    {{- if .Values.config.email.enabled }}
    # → SMTP
    {{- $smtpTo := (.Values.config.email.networkPolicy | default dict).to | default list }}
    {{- if gt (len $smtpTo) 0 }}
    - to:
        {{- toYaml $smtpTo | nindent 8 }}
      ports:
        - port: {{ .Values.config.email.port | default 587 }}
    {{- else }}
    # Legacy permissive egress — set config.email.networkPolicy.to to restrict.
    - ports:
        - port: {{ .Values.config.email.port | default 587 }}
    {{- end }}
    {{- end }}
    # → DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.config.garmin.enabled }}
---
# Garmin: accept from server, egress to Garmin API + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sparkyfitness.fullname" . }}-garmin
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
    app.kubernetes.io/component: garmin
spec:
  podSelector:
    matchLabels:
      {{- include "sparkyfitness.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: garmin
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "sparkyfitness.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: server
      ports:
        - port: {{ .Values.garmin.port }}
  egress:
    # → Garmin Connect API (HTTPS)
    {{- $garminTo := (.Values.config.garmin.networkPolicy | default dict).to | default list }}
    {{- if gt (len $garminTo) 0 }}
    - to:
        {{- toYaml $garminTo | nindent 8 }}
      ports:
        - port: 443
    {{- else }}
    # Legacy permissive egress — set config.garmin.networkPolicy.to to restrict.
    - ports:
        - port: 443
    {{- end }}
    # → DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
