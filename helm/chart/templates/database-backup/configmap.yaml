{{- if include "sparkyfitness.databaseBackupEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sparkyfitness.fullname" . }}-database-backup-scripts
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-backup
data:
  database-backup.sh: |
    #!/bin/bash
    set -euo pipefail
    umask 077

    log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }
    die() { log "ERROR: $*" >&2; exit 1; }

    backup_root="${BACKUP_ROOT:-/backup}"
    archive_dir="${backup_root}/archives"
    daily_dir="${backup_root}/daily"
    weekly_dir="${backup_root}/weekly"
    monthly_dir="${backup_root}/monthly"
    tmp_dir="${backup_root}/tmp"

    mkdir -p "${archive_dir}" "${daily_dir}" "${weekly_dir}" "${monthly_dir}" "${tmp_dir}"

    timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
    archive="${archive_dir}/${BACKUP_ARCHIVE_PREFIX}-postgresql-${timestamp}.sql.gz"
    tmp_archive="${tmp_dir}/${BACKUP_ARCHIVE_PREFIX}-postgresql-${timestamp}.sql.gz.tmp"

    log "Starting backup: host=${DB_HOST} port=${DB_PORT} user=${DB_USER}"
    log "Target archive: ${archive}"

    export PGPASSWORD="${DB_PASSWORD}"

    # Run pg_dumpall with --verbose so per-database progress is emitted to
    # stderr. Filter stderr to only database-level messages and errors;
    # suppress ACL/privilege/schema detail lines.
    # pipefail ensures a pg_dumpall failure aborts the job rather than
    # silently producing a corrupt archive.
    pg_dumpall --verbose ${PG_DUMPALL_EXTRA_ARGS:-} \
      --host="${DB_HOST}" \
      --port="${DB_PORT}" \
      --username="${DB_USER}" \
      2> >(grep -E "^pg_dumpall: (dumping database|running pg_dump)|[Ee]rror|[Ww]arning" >&2) \
      | gzip -c > "${tmp_archive}" || die "pg_dumpall failed"

    mv "${tmp_archive}" "${archive}"

    archive_size="$(du -sh "${archive}" | cut -f1)"
    log "Backup complete: ${archive} (${archive_size})"

    link_slot() {
      slot_dir="$1"
      slot_name="$2"
      mkdir -p "${slot_dir}"
      rm -f "${slot_dir}/${slot_name}"
      ln "${archive}" "${slot_dir}/${slot_name}"
      log "Linked to ${slot_dir}/${slot_name}"
    }

    if [ "${RETENTION_DAYS:-0}" -gt 0 ]; then
      link_slot "${daily_dir}" "$(date -u +%F).sql.gz"
    fi

    if [ "${RETENTION_WEEKS:-0}" -gt 0 ]; then
      link_slot "${weekly_dir}" "$(date -u +%G-W%V).sql.gz"
    fi

    if [ "${RETENTION_MONTHS:-0}" -gt 0 ]; then
      link_slot "${monthly_dir}" "$(date -u +%Y-%m).sql.gz"
    fi

    build_keep_file() {
      bucket="$1"
      count="$2"
      keep_file="$3"
      : > "${keep_file}"
      now_epoch="$(date -u +%s)"
      i=0
      while [ "${i}" -lt "${count}" ]; do
        case "${bucket}" in
          daily)
            date -u -d "@$(( now_epoch - i * 86400 ))" +%Y-%m-%d
            ;;
          weekly)
            date -u -d "@$(( now_epoch - i * 7 * 86400 ))" +%G-W%V
            ;;
          monthly)
            awk -v y="$(date -u +%Y)" -v mon="$(date -u +%m)" -v i="${i}" \
              'BEGIN { mon -= i; while (mon <= 0) { mon += 12; y-- }; printf "%04d-%02d\n", y, mon }'
            ;;
          *)
            return 1
            ;;
        esac
        i=$((i + 1))
      done | sed 's/$/.sql.gz/' > "${keep_file}"
    }

    cleanup_slots() {
      slot_dir="$1"
      keep_file="$2"
      [ -d "${slot_dir}" ] || return 0
      removed=0
      find "${slot_dir}" -maxdepth 1 -type f | while IFS= read -r path; do
        name="$(basename "${path}")"
        if ! grep -Fxq "${name}" "${keep_file}"; then
          rm -f "${path}"
          log "Removed expired slot: ${path}"
          removed=$((removed + 1))
        fi
      done
    }

    daily_keep="$(mktemp)"
    weekly_keep="$(mktemp)"
    monthly_keep="$(mktemp)"
    trap 'rm -f "${daily_keep}" "${weekly_keep}" "${monthly_keep}"' EXIT

    build_keep_file daily   "${RETENTION_DAYS:-0}"   "${daily_keep}"
    build_keep_file weekly  "${RETENTION_WEEKS:-0}"  "${weekly_keep}"
    build_keep_file monthly "${RETENTION_MONTHS:-0}" "${monthly_keep}"

    log "Running retention cleanup (days=${RETENTION_DAYS:-0} weeks=${RETENTION_WEEKS:-0} months=${RETENTION_MONTHS:-0})"
    cleanup_slots "${daily_dir}"   "${daily_keep}"
    cleanup_slots "${weekly_dir}"  "${weekly_keep}"
    cleanup_slots "${monthly_dir}" "${monthly_keep}"

    orphans="$(find "${archive_dir}" -maxdepth 1 -type f -name "${BACKUP_ARCHIVE_PREFIX}-postgresql-*.sql.gz" -links 1 | wc -l)"
    find "${archive_dir}" -maxdepth 1 -type f -name "${BACKUP_ARCHIVE_PREFIX}-postgresql-*.sql.gz" -links 1 -delete
    find "${tmp_dir}" -maxdepth 1 -type f -delete
    log "Removed ${orphans} unreferenced archive(s)"
    log "Backup job finished successfully"
{{- end }}
