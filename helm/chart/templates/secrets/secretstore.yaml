{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/{{ .Values.externalSecrets.apiVersion }}
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStore.name }}
  labels:
    {{- include "sparkyfitness.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.secretStore.vaultServer | quote }}
      path: {{ .Values.externalSecrets.secretStore.vaultPath | quote }}
      version: v2
      {{- if .Values.externalSecrets.secretStore.caConfigMap.name }}
      caProvider:
        type: ConfigMap
        namespace: {{ .Values.externalSecrets.secretStore.caConfigMap.namespace }}
        name: {{ .Values.externalSecrets.secretStore.caConfigMap.name }}
        key: {{ .Values.externalSecrets.secretStore.caConfigMap.key }}
      {{- end }}
      auth:
        {{- $method := .Values.externalSecrets.secretStore.auth.method | default "kubernetes" }}
        {{- if eq $method "kubernetes" }}
        kubernetes:
          mountPath: {{ .Values.externalSecrets.secretStore.auth.mountPath }}
          role: {{ .Values.externalSecrets.secretStore.auth.role }}
        {{- else if eq $method "appRole" }}
        {{- $appRole := .Values.externalSecrets.secretStore.auth.appRole }}
        appRole:
          path: {{ $appRole.path | default "approle" }}
          roleId: {{ required "externalSecrets.secretStore.auth.appRole.roleId is required when method=appRole" $appRole.roleId | quote }}
          secretRef:
            name: {{ required "externalSecrets.secretStore.auth.appRole.secretRef.name is required when method=appRole" $appRole.secretRef.name | quote }}
            key: {{ required "externalSecrets.secretStore.auth.appRole.secretRef.key is required when method=appRole" $appRole.secretRef.key | quote }}
        {{- else if eq $method "token" }}
        {{- $token := .Values.externalSecrets.secretStore.auth.tokenSecretRef }}
        tokenSecretRef:
          name: {{ required "externalSecrets.secretStore.auth.tokenSecretRef.name is required when method=token" $token.name | quote }}
          key: {{ required "externalSecrets.secretStore.auth.tokenSecretRef.key is required when method=token" $token.key | quote }}
        {{- else }}
        {{- fail (printf "Unsupported externalSecrets.secretStore.auth.method: %s (use kubernetes, appRole, or token)" $method) }}
        {{- end }}
{{- end }}
