name: Bug Report
description: Report a bug or unexpected behavior in SparkyFitness
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can so we can reproduce and fix it faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: How are you running SparkyFitness?
      options:
        - Docker Compose
        - Docker (manual)
        - Bare metal / manual install
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SparkyFitness version
      placeholder: e.g. v0.16.5.0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area is affected?
      multiple: true
      options:
        - Web frontend
        - Mobile app (iOS)
        - Mobile app (Android)
        - Server / API
        - AI / SparkyAI
        - Integrations (Garmin, Fitbit, etc.)
        - Database / migrations
        - Docker / deployment
        - Other

  - type: textarea
    id: docker_setup
    attributes:
      label: Docker Compose & Environment Configuration
      description: For setup or deployment-related issues, please paste your `docker-compose.yml` and redacted `.env` configurations (do NOT include sensitive passwords or keys).
      placeholder: |
        # docker-compose.yml snippet
        ...
        # Redacted .env snippet
        ...
      render: yaml

  - type: textarea
    id: runtime_logs
    attributes:
      label: Runtime Logs (Server, Web, or Mobile)
      description: For runtime errors, please paste console output or stack traces from the affected component (server, browser console, or mobile/Expo logs).
      placeholder: Paste logs or stack traces here...
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Screen Recordings
      description: Drag and drop or paste any screenshots or screen recordings that visually show the issue.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context, browser/OS info, environment details, etc.
