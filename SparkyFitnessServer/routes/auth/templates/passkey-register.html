<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Passkey</title>
    <script src="/api/auth/web-login/simplewebauthn-browser.umd.min.js"></script>
    <style>
      body {
        background-color: #0b0f19;
        color: #f3f4f6;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .card {
        background-color: #1f2937;
        border: 1px solid #374151;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: #3b82f6;
      }
      p {
        color: #9ca3af;
        font-size: 0.875rem;
        margin-bottom: 25px;
      }
      .btn {
        background-color: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s;
      }
      .btn:hover {
        background-color: #2563eb;
      }
      .btn:disabled {
        background-color: #4b5563;
        cursor: not-allowed;
      }
      .error {
        color: #ef4444;
        margin-top: 15px;
        font-size: 0.875rem;
      }
      .spinner {
        border: 3px solid #374151;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="loading-spinner" class="spinner"></div>
      <h1 id="title">Creating Passkey...</h1>
      <p id="desc">Please complete the biometric registration prompt.</p>
      <button id="retry-btn" class="btn" style="display: none">
        Retry Registration
      </button>
      <div id="error-msg" class="error"></div>
    </div>

    <script>
      const { startRegistration } = SimpleWebAuthnBrowser;

      // Read params from the URL fragment (after #), not the query string.
      // Fragments are never sent to the server, so the session token can't leak
      // into access / proxy logs.
      const hashParams = new URLSearchParams(
        window.location.hash.replace(/^#/, '')
      );
      const sessionToken = hashParams.get('token');
      const passkeyName = hashParams.get('name') || 'Mobile Device';

      async function doRegister() {
        const errorDiv = document.getElementById('error-msg');
        const retryBtn = document.getElementById('retry-btn');
        const spinner = document.getElementById('loading-spinner');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        errorDiv.innerText = '';
        retryBtn.style.display = 'none';
        spinner.style.display = 'block';
        title.innerText = 'Creating Passkey...';
        desc.innerText = 'Please complete the biometric registration prompt.';

        try {
          // 1. Fetch registration options from the server
          const optionsRes = await fetch(
            '/api/auth/passkey/generate-register-options?name=' +
              encodeURIComponent(passkeyName),
            {
              headers: { Authorization: 'Bearer ' + sessionToken },
            }
          );
          if (!optionsRes.ok) {
            const errData = await optionsRes.json().catch(() => ({}));
            throw new Error(
              errData.message || 'Failed to generate registration options.'
            );
          }
          const options = await optionsRes.json();

          // 2. Trigger browser's native passkey registration
          const credential = await startRegistration({ optionsJSON: options });

          // 3. Post verification credential back to server
          const verifyRes = await fetch(
            '/api/auth/passkey/verify-registration',
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + sessionToken,
              },
              body: JSON.stringify({
                response: credential,
                name: passkeyName,
              }),
            }
          );

          if (!verifyRes.ok) {
            const errData = await verifyRes.json().catch(() => ({}));
            throw new Error(
              errData.message || 'Passkey registration verification failed.'
            );
          }

          // Success! Redirect back to the mobile app callback with success status
          title.innerText = 'Success!';
          desc.innerText = 'Your passkey was registered. Redirecting back...';
          window.location.href =
            'sparkyfitnessmobile://oauth-callback?status=success';
        } catch (err) {
          console.error(err);
          spinner.style.display = 'none';
          title.innerText = 'Registration Failed';
          desc.innerText = 'Could not register your passkey.';
          errorDiv.innerText = err.message || String(err);
          retryBtn.style.display = 'block';
        }
      }

      document.getElementById('retry-btn').onclick = doRegister;

      // Auto-trigger on load
      window.onload = doRegister;
    </script>
  </body>
</html>
